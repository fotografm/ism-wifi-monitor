<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WiFi APs &#8212; raspi81</title>
<link rel="stylesheet" href="/raspi-style.css">
<style>
body { padding: 0; }
#topbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 14px; border-bottom: 1px solid var(--border-dim);
    background: var(--panel); margin-bottom: 16px;
}
#topbar h1 { font-size: 13px; color: var(--heading); letter-spacing: 2px;
             text-transform: uppercase; white-space: nowrap; }
.back-btn { padding: 4px 12px; border: 1px solid var(--btn-border);
    background: var(--btn-bg); color: var(--btn-label);
    border-radius: 4px; text-decoration: none; font-size: 11px; flex-shrink: 0; }
.back-btn:hover { background: var(--btn-bg-h); }
#tick { font-size: 10px; color: var(--dim); margin-left: auto; }
.content { padding: 0 14px 14px; }

.filter-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.filter-bar input { background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 11px;
    padding: 4px 8px; border-radius: 3px; width: 200px; }
.filter-bar button { background: var(--btn-bg); border: 1px solid var(--btn-border);
    color: var(--btn-label); font-family: inherit; font-size: 10px;
    padding: 4px 10px; cursor: pointer; border-radius: 3px; }
.filter-bar button:hover { background: var(--btn-bg-h); }
#ap-count { font-size: 10px; color: var(--dim); }

.rssi-good { color: var(--value-green); }
.rssi-ok   { color: var(--value-warn); }
.rssi-weak { color: var(--value-alert); }
.rssi-none { color: var(--dim); }
.enc-open  { color: var(--value-alert); }
.enc-wpa   { color: var(--value-green); }

th { cursor: pointer; user-select: none; }
th:hover { color: var(--heading); }
th.sort-asc::after  { content: " \2191"; color: var(--value-green); }
th.sort-desc::after { content: " \2193"; color: var(--value-green); }

tr.new-row { background-color: #1a1a38; transition: none; }
tr { transition: background-color 1.4s ease; }
</style>
</head>
<body>
<div id="topbar">
    <a href="#" onclick="window.location.href='http://'+window.location.hostname;return false;" class="back-btn">&#8592; Home</a>
    <h1>&#128246; WiFi APs</h1>
    <span id="tick">&#8212;</span>
</div>
<div class="content">

<div class="filter-bar">
    <input type="text" id="ap-filter" placeholder="Filter&#8230;" style="width:260px">
    <button onclick="applyFilter()">Apply</button>
    <button onclick="clearFilter()">Clear</button>
    <span id="ap-count"></span>
</div>

<table>
    <thead>
        <tr>
            <th onclick="sortBy('ssid')">SSID</th>
            <th onclick="sortBy('bssid')">BSSID</th>
            <th onclick="sortBy('channel')">CH</th>
            <th>Freq</th>
            <th onclick="sortBy('rssi')">Signal</th>
            <th onclick="sortBy('encryption')">Enc</th>
            <th onclick="sortBy('first_seen')">First seen</th>
            <th onclick="sortBy('last_seen')">Last seen</th>
            <th onclick="sortBy('seen_count')">#</th>
        </tr>
    </thead>
    <tbody id="ap-tbody"></tbody>
</table>

</div>
<script>
var allAps = [];
var sortCol = 'last_seen';
var sortDir = 'desc';
var filterStr = '';
var knownBssids = {};

var COL_IDX = { ssid:0, bssid:1, channel:2, rssi:4, encryption:5, first_seen:6, last_seen:7, seen_count:8 };

function rssiClass(v) {
    if (v === null || v === undefined) return 'rssi-none';
    if (v >= -60) return 'rssi-good';
    if (v >= -75) return 'rssi-ok';
    return 'rssi-weak';
}
function encClass(e) { return e === 'OPEN' ? 'enc-open' : 'enc-wpa'; }
function fmtTs(ts) { return ts ? ts.replace('T', ' ').slice(0, 16) : '\u2014'; }

// Build a searchable string from all fields of an AP record
function apSearchStr(ap) {
    return [
        ap.ssid || '',
        ap.bssid || '',
        ap.channel !== null && ap.channel !== undefined ? String(ap.channel) : '',
        ap.frequency_mhz !== null && ap.frequency_mhz !== undefined ? String(ap.frequency_mhz) : '',
        ap.signal_dbm !== null && ap.signal_dbm !== undefined ? String(ap.signal_dbm) : '',
        ap.encryption || '',
        ap.first_seen || '',
        ap.last_seen || ''
    ].join(' ').toLowerCase();
}

function applyFilter() {
    filterStr = document.getElementById('ap-filter').value.trim().toLowerCase();
    renderTable();
}
function clearFilter() {
    document.getElementById('ap-filter').value = '';
    filterStr = '';
    renderTable();
}

function sortBy(col) {
    if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
        sortCol = col;
        sortDir = 'desc';
    }
    document.querySelectorAll('thead th').forEach(function(th) { th.className = ''; });
    var idx = COL_IDX[col];
    if (idx !== undefined) {
        document.querySelectorAll('thead th')[idx].className = 'sort-' + sortDir;
    }
    renderTable();
}

function renderTable() {
    filterStr = document.getElementById('ap-filter').value.trim().toLowerCase();
    var filtered = allAps.filter(function(ap) {
        if (!filterStr) return true;
        return apSearchStr(ap).indexOf(filterStr) !== -1;
    });

    filtered.sort(function(a, b) {
        var av = a[sortCol], bv = b[sortCol];
        if (av === null || av === undefined) av = sortDir === 'asc' ? '\uffff' : '';
        if (bv === null || bv === undefined) bv = sortDir === 'asc' ? '\uffff' : '';
        if (typeof av === 'number' && typeof bv === 'number') {
            return sortDir === 'asc' ? av - bv : bv - av;
        }
        av = String(av); bv = String(bv);
        if (sortDir === 'asc') return av < bv ? -1 : av > bv ? 1 : 0;
        return av > bv ? -1 : av < bv ? 1 : 0;
    });

    var tbody = document.getElementById('ap-tbody');

    filtered.forEach(function(ap, idx) {
        var bssid = ap.bssid;
        var isNew = knownBssids[bssid] !== undefined && knownBssids[bssid] !== ap.last_seen;

        var row = tbody.rows[idx];
        if (!row) {
            row = tbody.insertRow(idx);
            for (var i = 0; i < 9; i++) row.insertCell(i);
        }
        row.cells[0].textContent = ap.ssid || '[hidden]';
        row.cells[1].textContent = bssid;
        row.cells[1].style.fontSize = '10px';
        row.cells[2].textContent = ap.channel !== null && ap.channel !== undefined ? ap.channel : '\u2014';
        row.cells[3].textContent = ap.frequency_mhz || '\u2014';
        row.cells[3].style.color = 'var(--dim)';
        row.cells[4].textContent = ap.signal_dbm !== null && ap.signal_dbm !== undefined ? ap.signal_dbm : '\u2014';
        row.cells[4].className = rssiClass(ap.signal_dbm);
        row.cells[5].textContent = ap.encryption || '\u2014';
        row.cells[5].className = encClass(ap.encryption);
        row.cells[6].textContent = fmtTs(ap.first_seen);
        row.cells[6].style.color = 'var(--dim)';
        row.cells[7].textContent = fmtTs(ap.last_seen);
        row.cells[8].textContent = ap.seen_count !== null && ap.seen_count !== undefined ? ap.seen_count : '\u2014';
        row.cells[8].style.color = 'var(--muted)';

        if (isNew) {
            (function(r) {
                r.classList.add('new-row');
                requestAnimationFrame(function() {
                    requestAnimationFrame(function() { r.classList.remove('new-row'); });
                });
            })(row);
        }
        knownBssids[bssid] = ap.last_seen;
    });

    while (tbody.rows.length > filtered.length) {
        tbody.deleteRow(tbody.rows.length - 1);
    }
    document.getElementById('ap-count').textContent = filtered.length + ' access points';
}

function fetchAps() {
    fetch('/api/aps').then(function(r) { return r.json(); }).then(function(data) {
        allAps = data;
        renderTable();
    }).catch(function() {});
}

var TICK = 5;
var cd = TICK;
setInterval(function() {
    cd--;
    document.getElementById('tick').textContent = 'refresh in ' + cd + 's';
    if (cd <= 0) {
        cd = TICK;
        fetchAps();
    }
}, 1000);

document.getElementById('ap-filter').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') applyFilter();
});

document.querySelectorAll('thead th')[7].className = 'sort-desc';

fetchAps();
</script>
</body>
</html>
